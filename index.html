<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Recetario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .recipe-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .recipe-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .recipe-success {
            background: linear-gradient(135deg, #86efac 0%, #4ade80 100%) !important;
            color: #166534 !important;
        }
        .recipe-success h3, .recipe-success h4 { color: #166534 !important; }
        .recipe-success p, .recipe-success span { color: #15803d !important; }
        .recipe-success .fa-star { color: #fbbf24 !important; }
        
        .paste-area {
            border: 3px dashed #cbd5e1;
            transition: all 0.3s;
        }
        .paste-area.dragover {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }
        
        .modal-backdrop {
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-backdrop.active { opacity: 1; }
        .modal-content {
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s;
        }
        .modal-backdrop.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .delete-confirm {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .sync-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .recipe-card { margin-bottom: 1rem; }
            .glass-card { max-height: 95vh; }
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 z-40 glass px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-br from-orange-500 to-red-600 rounded-full flex items-center justify-center">
                    <i class="fas fa-utensils text-white text-sm"></i>
                </div>
                <h1 class="text-xl font-serif font-bold text-white">Mi Recetario</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="openConfigModal()" class="w-9 h-9 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white transition-all hover:scale-110" title="Configurar GitHub">
                    <i class="fas fa-cog"></i>
                </button>
                <button onclick="syncToGitHub()" class="w-9 h-9 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white transition-all hover:scale-110" title="Sincronizar">
                    <i class="fas fa-sync-alt" id="syncIcon"></i>
                </button>
                <button onclick="downloadHTML()" class="w-9 h-9 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white transition-all hover:scale-110" title="Descargar HTML">
                    <i class="fas fa-file-code"></i>
                </button>
                <button onclick="openSearchModal()" class="w-9 h-9 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white transition-all hover:scale-110" title="Buscar">
                    <i class="fas fa-search"></i>
                </button>
                <button onclick="openAddModal()" class="w-10 h-10 rounded-full bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 flex items-center justify-center text-white shadow-lg transition-all hover:scale-110" title="Agregar">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-20 pb-12 px-4 max-w-6xl mx-auto">
        
        <!-- Status Bar -->
        <div class="mb-4 flex items-center justify-between text-xs text-gray-400">
            <span id="syncStatus"><i class="fas fa-circle text-gray-500 mr-1"></i>No configurado</span>
            <span id="recipeCount">0 recetas</span>
        </div>

        <!-- Recipes Grid -->
        <div class="mb-8">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <i class="fas fa-fire text-orange-500 text-xl"></i>
                    <h3 class="text-xl font-serif font-bold text-white">Mis Recetas</h3>
                </div>
                <button onclick="sortRecipes()" class="px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 text-white text-xs transition-all flex items-center gap-1">
                    <i class="fas fa-sort-alpha-down"></i>
                    <span>A-Z</span>
                </button>
            </div>
            
            <div id="recipesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            </div>
            
            <div id="emptyState" class="hidden text-center py-12">
                <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-white/10 flex items-center justify-center">
                    <i class="fas fa-book-open text-3xl text-gray-400"></i>
                </div>
                <p class="text-gray-400 text-sm">No hay recetas. ¡Agregá la primera!</p>
            </div>
        </div>

    </main>

    <!-- Config Modal (for GitHub token) -->
    <div id="configModal" class="fixed inset-0 z-50 hidden modal-backdrop">
        <div class="absolute inset-0 bg-black/80" onclick="closeConfigModal()"></div>
        <div class="relative min-h-screen flex items-center justify-center p-4">
            <div class="modal-content glass-card w-full max-w-md rounded-2xl shadow-2xl p-6">
                <h3 class="text-lg font-serif font-bold text-gray-800 mb-4">Configurar GitHub</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Token de GitHub</label>
                        <input type="password" id="githubToken" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-orange-500 outline-none text-sm" placeholder="ghp_...">
                        <p class="text-xs text-gray-500 mt-1">Se guarda solo en este dispositivo</p>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Usuario/Repo</label>
                        <input type="text" id="githubRepo" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-orange-500 outline-none text-sm" placeholder="usuario/repo" value="Css0626/recetario">
                    </div>
                    <div class="flex gap-2 mt-6">
                        <button onclick="closeConfigModal()" class="flex-1 py-2 rounded-lg border border-gray-300 text-gray-700 font-medium text-sm">Cancelar</button>
                        <button onclick="saveConfig()" class="flex-1 py-2 rounded-lg bg-gradient-to-r from-orange-500 to-red-600 text-white font-medium text-sm">Guardar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Recipe Modal -->
    <div id="addModal" class="fixed inset-0 z-50 hidden modal-backdrop">
        <div class="absolute inset-0 bg-black/80" onclick="closeAddModal()"></div>
        <div class="relative min-h-screen flex items-center justify-center p-4">
            <div class="modal-content glass-card w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white border-b px-4 py-3 flex items-center justify-between z-10">
                    <h3 class="text-lg font-serif font-bold text-gray-800" id="modalTitle">Nueva Receta</h3>
                    <button onclick="closeAddModal()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center">
                        <i class="fas fa-times text-gray-500"></i>
                    </button>
                </div>
                
                <div class="p-4">
                    <input type="hidden" id="editRecipeId">
                    
                    <div class="flex gap-2 mb-4 p-1 bg-gray-100 rounded-lg">
                        <button onclick="setAddMode('text')" id="textModeBtn" class="flex-1 py-2 px-3 rounded-md text-sm font-medium transition-all bg-white shadow-sm text-gray-800">
                            <i class="fas fa-keyboard mr-1"></i>Escribir
                        </button>
                        <button onclick="setAddMode('image')" id="imageModeBtn" class="flex-1 py-2 px-3 rounded-md text-sm font-medium transition-all text-gray-600">
                            <i class="fas fa-image mr-1"></i>Fotos
                        </button>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Título</label>
                        <input type="text" id="recipeTitle" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-orange-500 outline-none text-base" placeholder="Ej: Pizza Margarita">
                    </div>

                    <div id="textMode" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Ingredientes</label>
                            <textarea id="recipeIngredients" rows="4" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-orange-500 outline-none resize-none text-base" placeholder="• 2 tazas harina&#10;• 1 taza agua..."></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Preparación</label>
                            <textarea id="recipeInstructions" rows="5" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-orange-500 outline-none resize-none text-base" placeholder="1. Mezclar...&#10;2. Hornear..."></textarea>
                        </div>
                    </div>

                    <div id="imageMode" class="hidden">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Fotos</label>
                        <div id="pasteArea" class="paste-area rounded-lg p-4 text-center cursor-pointer mb-2" onclick="document.getElementById('fileInput').click()">
                            <input type="file" id="fileInput" class="hidden" accept="image/*" multiple onchange="handleFileSelect(event)">
                            <div id="pastePlaceholder">
                                <i class="fas fa-camera text-2xl text-gray-400 mb-1"></i>
                                <p class="text-gray-600 text-sm">Tocá para subir fotos</p>
                            </div>
                        </div>
                        <div id="imagesPreview" class="flex flex-wrap gap-2"></div>
                    </div>

                    <div class="flex gap-2 mt-6">
                        <button onclick="closeAddModal()" class="flex-1 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium text-sm">Cancelar</button>
                        <button onclick="saveRecipe()" class="flex-1 py-2.5 rounded-lg bg-gradient-to-r from-orange-500 to-red-600 text-white font-medium text-sm shadow-lg">
                            <i class="fas fa-save mr-1"></i>Guardar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="searchModal" class="fixed inset-0 z-50 hidden modal-backdrop">
        <div class="absolute inset-0 bg-black/80" onclick="closeSearchModal()"></div>
        <div class="relative min-h-screen flex items-start justify-center pt-16 p-4">
            <div class="modal-content glass-card w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden max-h-[80vh] flex flex-col">
                <div class="p-4 border-b">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="flex-1 relative">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="searchInput" oninput="performSearch()" class="w-full pl-10 pr-3 py-2 rounded-lg border border-gray-300 focus:border-orange-500 outline-none text-base" placeholder="Buscar...">
                        </div>
                        <button onclick="closeSearchModal()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center">
                            <i class="fas fa-times text-gray-500"></i>
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-1 overflow-x-auto pb-1">
                        <button onclick="filterByLetter('all')" class="px-3 py-1 rounded-full bg-orange-500 text-white text-xs font-medium whitespace-nowrap">Todas</button>
                        <div id="alphabetFilters" class="flex gap-1"></div>
                    </div>
                </div>
                
                <div id="searchResults" class="flex-1 overflow-y-auto p-4"></div>
            </div>
        </div>
    </div>

    <!-- Recipe Detail Modal -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden modal-backdrop">
        <div class="absolute inset-0 bg-black/80" onclick="closeDetailModal()"></div>
        <div class="relative min-h-screen flex items-center justify-center p-2">
            <div id="detailContent" class="modal-content glass-card w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden max-h-[95vh] overflow-y-auto">
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 z-[60] hidden modal-backdrop">
        <div class="absolute inset-0 bg-black/80"></div>
        <div class="relative min-h-screen flex items-center justify-center p-4">
            <div class="modal-content bg-white w-full max-w-sm rounded-2xl shadow-2xl p-5 text-center">
                <div class="w-14 h-14 mx-auto mb-3 rounded-full bg-red-100 flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-red-500 text-xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">¿Eliminar receta?</h3>
                <p class="text-gray-600 text-sm mb-4">¿Seguro que querés eliminar "<span id="deleteRecipeName" class="font-semibold"></span>"?</p>
                <div class="flex gap-2">
                    <button onclick="closeDeleteModal()" class="flex-1 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium text-sm">Cancelar</button>
                    <button onclick="confirmDelete()" class="flex-1 py-2.5 rounded-lg bg-red-500 text-white font-medium text-sm">
                        <i class="fas fa-trash mr-1"></i>Eliminar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration (loaded from localStorage)
        let GITHUB_CONFIG = {
            token: localStorage.getItem('github_token') || '',
            owner: 'Css0626',
            repo: 'recetario'
        };

        // Data Management
        let recipes = [];
        let currentAddMode = 'text';
        let currentImagesData = [];
        let currentDetailRecipe = null;
        let recipeToDelete = null;
        let isEditing = false;
        let isOnline = navigator.onLine;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Load config
            const savedRepo = localStorage.getItem('github_repo');
            if (savedRepo) {
                const [owner, repo] = savedRepo.split('/');
                GITHUB_CONFIG.owner = owner;
                GITHUB_CONFIG.repo = repo;
            }
            
            // Load recipes from local
            const localData = localStorage.getItem('recipes');
            if (localData) {
                recipes = JSON.parse(localData);
                renderRecipes();
            }
            
            setupPasteListener();
            generateAlphabetFilters();
            updateSyncStatus();
            
            // Online monitoring
            window.addEventListener('online', () => { isOnline = true; updateSyncStatus(); });
            window.addEventListener('offline', () => { isOnline = false; updateSyncStatus(); });
            
            // Auto-sync if configured
            if (GITHUB_CONFIG.token && isOnline) {
                loadFromGitHub();
            }
        });

        function updateSyncStatus() {
            const status = document.getElementById('syncStatus');
            const hasToken = !!GITHUB_CONFIG.token;
            
            if (!hasToken) {
                status.innerHTML = '<i class="fas fa-circle text-gray-500 mr-1"></i>Sin configurar';
            } else if (!isOnline) {
                status.innerHTML = '<i class="fas fa-circle text-red-500 mr-1"></i>Sin conexión';
            } else {
                const lastSync = localStorage.getItem('lastSync');
                if (lastSync) {
                    const date = new Date(lastSync);
                    const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    status.innerHTML = `<i class="fas fa-circle text-green-500 mr-1"></i>Sync: ${timeStr}`;
                } else {
                    status.innerHTML = '<i class="fas fa-circle text-yellow-500 mr-1"></i>Pendiente';
                }
            }
        }

        // Config Modal
        function openConfigModal() {
            document.getElementById('githubToken').value = GITHUB_CONFIG.token;
            document.getElementById('githubRepo').value = `${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}`;
            document.getElementById('configModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('configModal').classList.add('active'), 10);
        }

        function closeConfigModal() {
            document.getElementById('configModal').classList.remove('active');
            setTimeout(() => document.getElementById('configModal').classList.add('hidden'), 300);
        }

        function saveConfig() {
            const token = document.getElementById('githubToken').value.trim();
            const repo = document.getElementById('githubRepo').value.trim();
            
            if (token) {
                localStorage.setItem('github_token', token);
                GITHUB_CONFIG.token = token;
            }
            
            if (repo && repo.includes('/')) {
                localStorage.setItem('github_repo', repo);
                const [owner, repoName] = repo.split('/');
                GITHUB_CONFIG.owner = owner;
                GITHUB_CONFIG.repo = repoName;
            }
            
            updateSyncStatus();
            closeConfigModal();
            showNotification('✅ Configuración guardada');
            
            if (GITHUB_CONFIG.token && isOnline) {
                loadFromGitHub();
            }
        }

        // GitHub API using Issues
        async function syncToGitHub() {
            if (!GITHUB_CONFIG.token) {
                showNotification('⚙️ Configurá tu token primero');
                openConfigModal();
                return false;
            }
            
            if (!isOnline) {
                showNotification('❌ Sin conexión. Guardado local.');
                return false;
            }

            const icon = document.getElementById('syncIcon');
            icon.classList.add('sync-spin');

            try {
                const issuesResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues?state=all&labels=recetas-data&per_page=1`,
                    {
                        headers: {
                            'Authorization': `Bearer ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                const issues = await issuesResponse.json();
                const content = JSON.stringify(recipes);
                const title = '📚 Recetas Database';
                const body = `<!-- RECETAS_DATA_START -->\n${content}\n<!-- RECETAS_DATA_END -->`;

                let success = false;

                if (issues && issues.length > 0) {
                    const issueNumber = issues[0].number;
                    const updateResponse = await fetch(
                        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues/${issueNumber}`,
                        {
                            method: 'PATCH',
                            headers: {
                                'Authorization': `Bearer ${GITHUB_CONFIG.token}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ body: body, state: 'open' })
                        }
                    );
                    success = updateResponse.ok;
                } else {
                    const createResponse = await fetch(
                        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues`,
                        {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${GITHUB_CONFIG.token}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                title: title,
                                body: body,
                                labels: ['recetas-data']
                            })
                        }
                    );
                    success = createResponse.ok;
                }

                if (success) {
                    localStorage.setItem('lastSync', new Date().toISOString());
                    updateSyncStatus();
                    showNotification('✅ Sincronizado');
                    return true;
                } else {
                    throw new Error('Failed');
                }
            } catch (error) {
                showNotification('❌ Error de sync');
                return false;
            } finally {
                icon.classList.remove('sync-spin');
            }
        }

        async function loadFromGitHub() {
            if (!GITHUB_CONFIG.token || !isOnline) return;

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/issues?state=all&labels=recetas-data&per_page=1`,
                    {
                        headers: {
                            'Authorization': `Bearer ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                if (!response.ok) return;
                const issues = await response.json();
                
                if (issues && issues.length > 0) {
                    const body = issues[0].body;
                    const match = body.match(/<!-- RECETAS_DATA_START -->\n([\s\S]*?)\n<!-- RECETAS_DATA_END -->/);
                    
                    if (match && match[1]) {
                        const githubRecipes = JSON.parse(match[1]);

                        // Merge inteligente: combinar recetas locales y de GitHub por ID
                        // Las locales tienen prioridad si GitHub está vacío o tiene menos datos
                        if (githubRecipes.length === 0 && recipes.length > 0) {
                            // GitHub está vacío pero hay datos locales → subir locales
                            await syncToGitHub();
                        } else {
                            // Merge: tomar todas las recetas únicas por ID, GitHub gana en conflicto
                            const localMap = Object.fromEntries(recipes.map(r => [r.id, r]));
                            const githubMap = Object.fromEntries(githubRecipes.map(r => [r.id, r]));
                            const merged = Object.values({ ...localMap, ...githubMap });
                            
                            if (JSON.stringify(merged) !== JSON.stringify(recipes)) {
                                recipes = merged;
                                localStorage.setItem('recipes', JSON.stringify(recipes));
                                renderRecipes();
                                showNotification('✅ Datos sincronizados');
                            }
                        }
                        localStorage.setItem('lastSync', new Date().toISOString());
                        updateSyncStatus();
                    }
                } else if (recipes.length > 0) {
                    // No hay issue en GitHub pero hay datos locales → crear el issue
                    await syncToGitHub();
                }
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        // Storage & Rendering
        function saveToStorage() {
            localStorage.setItem('recipes', JSON.stringify(recipes));
            document.getElementById('recipeCount').textContent = `${recipes.length} receta${recipes.length !== 1 ? 's' : ''}`;
        }

        function downloadHTML() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Mi-Recetario.html';
            link.click();
            showNotification('HTML descargado');
        }

        function renderRecipes() {
            const container = document.getElementById('recipesGrid');
            const emptyState = document.getElementById('emptyState');
            
            saveToStorage();
            
            if (recipes.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            const sorted = [...recipes].sort((a, b) => (b.visits || 0) - (a.visits || 0));
            container.innerHTML = sorted.map(recipe => createRecipeCard(recipe)).join('');
        }

        function createRecipeCard(recipe) {
            const successClass = recipe.success ? 'recipe-success' : 'bg-white';
            const starClass = recipe.success ? 'text-yellow-500' : 'text-gray-300';
            const firstImg = (recipe.images && recipe.images.length > 0) ? recipe.images[0] : recipe.image;
            
            return `
                <div class="recipe-card ${successClass} rounded-xl overflow-hidden shadow-lg cursor-pointer group" onclick="openDetailModal(${recipe.id})">
                    ${firstImg ? `
                        <div class="h-40 overflow-hidden relative">
                            <img src="${firstImg}" class="w-full h-full object-cover" alt="${recipe.title}">
                            ${recipe.success ? '<div class="absolute top-2 right-2 w-6 h-6 bg-green-600 rounded-full flex items-center justify-center"><i class="fas fa-check text-white text-xs"></i></div>' : ''}
                            ${(recipe.images && recipe.images.length > 1) ? `<div class="absolute bottom-2 right-2 bg-black/60 text-white text-xs px-1.5 py-0.5 rounded">${recipe.images.length}</div>` : ''}
                        </div>
                    ` : ''}
                    <div class="p-4">
                        <h4 class="font-serif font-bold text-lg mb-1 ${recipe.success ? 'text-green-900' : 'text-gray-800'}">${recipe.title}</h4>
                        <div class="flex items-center justify-between text-xs ${recipe.success ? 'text-green-700' : 'text-gray-500'}">
                            <span><i class="fas fa-eye mr-1"></i>${recipe.visits || 0}</span>
                            <button onclick="event.stopPropagation(); toggleSuccess(${recipe.id})" class="${starClass}">
                                <i class="fas fa-star"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Add/Edit Modal
        function openAddModal() {
            isEditing = false;
            document.getElementById('modalTitle').textContent = 'Nueva Receta';
            document.getElementById('editRecipeId').value = '';
            resetAddForm();
            document.getElementById('addModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('addModal').classList.add('active'), 10);
            document.getElementById('recipeTitle').focus();
        }

        function openEditModal(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            
            isEditing = true;
            document.getElementById('modalTitle').textContent = 'Editar Receta';
            document.getElementById('editRecipeId').value = id;
            document.getElementById('recipeTitle').value = recipe.title;
            
            const imgs = recipe.images && recipe.images.length > 0 ? recipe.images : (recipe.image ? [recipe.image] : []);
            if (imgs.length > 0 && recipe.ingredients === 'Ver imagen adjunta') {
                setAddMode('image');
                currentImagesData = [...imgs];
                renderImagesPreview();
            } else {
                setAddMode('text');
                document.getElementById('recipeIngredients').value = recipe.ingredients;
                document.getElementById('recipeInstructions').value = recipe.instructions;
            }
            
            closeDetailModal();
            document.getElementById('addModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('addModal').classList.add('active'), 10);
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('addModal').classList.add('hidden');
                resetAddForm();
            }, 300);
        }

        function setAddMode(mode) {
            currentAddMode = mode;
            const textBtn = document.getElementById('textModeBtn');
            const imageBtn = document.getElementById('imageModeBtn');
            
            if (mode === 'text') {
                textBtn.className = 'flex-1 py-2 px-3 rounded-md text-sm font-medium transition-all bg-white shadow-sm text-gray-800';
                imageBtn.className = 'flex-1 py-2 px-3 rounded-md text-sm font-medium transition-all text-gray-600';
                document.getElementById('textMode').classList.remove('hidden');
                document.getElementById('imageMode').classList.add('hidden');
            } else {
                imageBtn.className = 'flex-1 py-2 px-3 rounded-md text-sm font-medium transition-all bg-white shadow-sm text-gray-800';
                textBtn.className = 'flex-1 py-2 px-3 rounded-md text-sm font-medium transition-all text-gray-600';
                document.getElementById('imageMode').classList.remove('hidden');
                document.getElementById('textMode').classList.add('hidden');
            }
        }

        function resetAddForm() {
            document.getElementById('recipeTitle').value = '';
            document.getElementById('recipeIngredients').value = '';
            document.getElementById('recipeInstructions').value = '';
            document.getElementById('imagesPreview').innerHTML = '';
            document.getElementById('pastePlaceholder').style.display = '';
            currentImagesData = [];
            isEditing = false;
            setAddMode('text');
        }

        // Image handling
        function setupPasteListener() {
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);
            
            document.addEventListener('paste', (e) => {
                if (!document.getElementById('addModal').classList.contains('hidden') && currentAddMode === 'image') {
                    const items = e.clipboardData.items;
                    for (let item of items) {
                        if (item.type.indexOf('image') !== -1) {
                            processImageFile(item.getAsFile());
                            break;
                        }
                    }
                }
            });

            const pasteArea = document.getElementById('pasteArea');
            pasteArea.addEventListener('dragover', (e) => { e.preventDefault(); pasteArea.classList.add('dragover'); });
            pasteArea.addEventListener('dragleave', () => pasteArea.classList.remove('dragover'));
            pasteArea.addEventListener('drop', (e) => {
                e.preventDefault();
                pasteArea.classList.remove('dragover');
                Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')).forEach(processImageFile);
            });
        }

        function handleFileSelect(event) {
            Array.from(event.target.files).forEach(processImageFile);
            event.target.value = '';
        }

        function processImageFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 1200;
                    const scale = Math.min(1, maxWidth / img.width);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentImagesData.push(canvas.toDataURL('image/jpeg', 0.7));
                    renderImagesPreview();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function renderImagesPreview() {
            const preview = document.getElementById('imagesPreview');
            const placeholder = document.getElementById('pastePlaceholder');
            placeholder.style.display = currentImagesData.length > 0 ? 'none' : '';
            
            preview.innerHTML = currentImagesData.map((src, i) => `
                <div class="relative" style="width:70px;height:70px;">
                    <img src="${src}" style="width:70px;height:70px;object-fit:cover;border-radius:6px;">
                    <button onclick="removeImage(${i})" style="position:absolute;top:-4px;right:-4px;width:20px;height:20px;background:#ef4444;border:none;border-radius:50%;color:white;font-size:10px;">×</button>
                    <span style="position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,0.6);color:white;font-size:8px;padding:1px 4px;border-radius:3px;">${i+1}</span>
                </div>
            `).join('');
        }

        function removeImage(index) {
            currentImagesData.splice(index, 1);
            renderImagesPreview();
        }

        // Save Recipe
        async function saveRecipe() {
            const title = document.getElementById('recipeTitle').value.trim();
            if (!title) { alert('Ingresá un título'); return; }

            let ingredients = '', instructions = '', images = [];

            if (currentAddMode === 'text') {
                ingredients = document.getElementById('recipeIngredients').value.trim();
                instructions = document.getElementById('recipeInstructions').value.trim();
                if (!ingredients || !instructions) { alert('Completá todos los campos'); return; }
            } else {
                if (currentImagesData.length === 0) { alert('Agregá al menos una foto'); return; }
                images = [...currentImagesData];
                ingredients = 'Ver imagen adjunta';
                instructions = 'Ver imagen adjunta';
            }

            if (isEditing) {
                const id = parseInt(document.getElementById('editRecipeId').value);
                const index = recipes.findIndex(r => r.id === id);
                if (index !== -1) {
                    recipes[index] = { ...recipes[index], title, ingredients, instructions, images, image: images[0] || null, date: new Date().toISOString() };
                }
            } else {
                recipes.unshift({
                    id: Date.now(), title, ingredients, instructions, images, image: images[0] || null,
                    visits: 0, success: false, date: new Date().toISOString()
                });
            }

            saveToStorage();
            renderRecipes();
            closeAddModal();
            
            if (GITHUB_CONFIG.token && isOnline) {
                await syncToGitHub();
            } else {
                showNotification('💾 Guardado local');
            }
        }

        // Detail Modal
        function openDetailModal(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            
            recipe.visits = (recipe.visits || 0) + 1;
            saveToStorage();
            
            currentDetailRecipe = recipe;
            
            const successClass = recipe.success ? 'bg-green-100' : 'bg-white';
            const textColor = recipe.success ? 'text-green-900' : 'text-gray-800';
            const imgs = (recipe.images && recipe.images.length > 0) ? recipe.images : (recipe.image ? [recipe.image] : []);
            
            const content = document.getElementById('detailContent');
            content.className = `modal-content w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden max-h-[95vh] overflow-y-auto ${successClass}`;
            
            content.innerHTML = `
                <div class="sticky top-0 ${recipe.success ? 'bg-green-200' : 'bg-white'} border-b px-4 py-3 flex items-center justify-between z-10">
                    <div class="flex items-center gap-2 flex-1 min-w-0">
                        <button onclick="toggleSuccess(${recipe.id}); openDetailModal(${recipe.id})" class="${recipe.success ? 'text-yellow-600' : 'text-gray-300'} text-xl">
                            <i class="fas fa-star"></i>
                        </button>
                        <h3 class="text-lg font-serif font-bold ${textColor} truncate">${recipe.title}</h3>
                    </div>
                    <div class="flex items-center gap-1 flex-shrink-0 ml-2">
                        <button onclick="openEditModal(${recipe.id})" class="w-8 h-8 rounded-full hover:bg-black/10 flex items-center justify-center">
                            <i class="fas fa-edit ${textColor} text-sm"></i>
                        </button>
                        <button onclick="openDeleteModal(${recipe.id})" class="w-8 h-8 rounded-full hover:bg-black/10 flex items-center justify-center">
                            <i class="fas fa-trash ${textColor} text-sm"></i>
                        </button>
                        <button onclick="closeDetailModal()" class="w-8 h-8 rounded-full hover:bg-black/10 flex items-center justify-center">
                            <i class="fas fa-times ${textColor}"></i>
                        </button>
                    </div>
                </div>
                
                <div class="p-4">
                    ${imgs.length > 0 ? `
                        <div class="mb-4">
                            ${imgs.length === 1 ? 
                                `<img src="${imgs[0]}" class="w-full rounded-lg" onclick="openImageFullscreen('${imgs[0]}')">` :
                                `<div class="grid grid-cols-3 gap-2">${imgs.map(src => `<img src="${src}" class="w-full aspect-square object-cover rounded-lg" onclick="openImageFullscreen('${src}')">`).join('')}</div>`
                            }
                        </div>
                    ` : ''}
                    
                    <div class="space-y-4">
                        <div class="bg-orange-50 rounded-lg p-4">
                            <h4 class="font-bold text-orange-800 text-sm mb-2"><i class="fas fa-shopping-basket mr-1"></i>Ingredientes</h4>
                            <div class="text-sm text-gray-700 whitespace-pre-line">${recipe.ingredients}</div>
                        </div>
                        <div class="bg-blue-50 rounded-lg p-4">
                            <h4 class="font-bold text-blue-800 text-sm mb-2"><i class="fas fa-fire mr-1"></i>Preparación</h4>
                            <div class="text-sm text-gray-700 whitespace-pre-line">${recipe.instructions}</div>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex items-center justify-between text-xs text-gray-500">
                        <span><i class="fas fa-eye mr-1"></i>${recipe.visits} visitas</span>
                        <span>${new Date(recipe.date).toLocaleDateString()}</span>
                    </div>
                </div>
            `;
            
            document.getElementById('detailModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('detailModal').classList.add('active'), 10);
        }

        function openImageFullscreen(src) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;';
            overlay.onclick = () => overlay.remove();
            overlay.innerHTML = `<img src="${src}" style="max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;">`;
            document.body.appendChild(overlay);
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('detailModal').classList.add('hidden');
                currentDetailRecipe = null;
            }, 300);
        }

        // Delete
        async function openDeleteModal(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            recipeToDelete = id;
            document.getElementById('deleteRecipeName').textContent = recipe.title;
            document.getElementById('deleteModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('deleteModal').classList.add('active'), 10);
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('deleteModal').classList.add('hidden');
                recipeToDelete = null;
            }, 300);
        }

        async function confirmDelete() {
            if (recipeToDelete) {
                recipes = recipes.filter(r => r.id !== recipeToDelete);
                saveToStorage();
                renderRecipes();
                closeDetailModal();
                closeDeleteModal();
                if (GITHUB_CONFIG.token && isOnline) await syncToGitHub();
            }
        }

        // Success Toggle
        async function toggleSuccess(id) {
            const recipe = recipes.find(r => r.id === id);
            if (recipe) {
                recipe.success = !recipe.success;
                saveToStorage();
                renderRecipes();
                if (GITHUB_CONFIG.token && isOnline) await syncToGitHub();
            }
        }

        // Search
        function openSearchModal() {
            document.getElementById('searchModal').classList.remove('hidden');
            document.getElementById('searchInput').focus();
            setTimeout(() => document.getElementById('searchModal').classList.add('active'), 10);
            performSearch();
        }

        function closeSearchModal() {
            document.getElementById('searchModal').classList.remove('active');
            setTimeout(() => document.getElementById('searchModal').classList.add('hidden'), 300);
        }

        function generateAlphabetFilters() {
            const container = document.getElementById('alphabetFilters');
            container.innerHTML = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(letter => `
                <button onclick="filterByLetter('${letter}')" class="w-7 h-7 rounded-full hover:bg-orange-100 text-gray-600 hover:text-orange-600 text-xs font-medium flex items-center justify-center">${letter}</button>
            `).join('');
        }

        function filterByLetter(letter) {
            const filtered = letter === 'all' ? recipes : recipes.filter(r => r.title.toUpperCase().startsWith(letter));
            renderSearchResults(filtered);
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = query ? recipes.filter(r => r.title.toLowerCase().includes(query) || r.ingredients.toLowerCase().includes(query)) : recipes;
            renderSearchResults(filtered);
        }

        function renderSearchResults(results) {
            const container = document.getElementById('searchResults');
            container.innerHTML = results.length === 0 ? 
                '<div class="text-center text-gray-500 py-8 text-sm">No se encontraron recetas</div>' :
                results.map(recipe => `
                    <div class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-lg cursor-pointer border-b border-gray-100" onclick="closeSearchModal(); openDetailModal(${recipe.id})">
                        <div class="w-12 h-12 rounded-lg overflow-hidden bg-gray-200 flex-shrink-0">
                            ${recipe.image ? `<img src="${recipe.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full bg-gradient-to-br from-green-200 to-emerald-300 flex items-center justify-center"><i class="fas fa-utensils text-green-700 text-xs"></i></div>`}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-sm ${recipe.success ? 'text-green-700' : 'text-gray-800'} truncate">${recipe.title}</h4>
                            <p class="text-xs text-gray-500 truncate">${recipe.ingredients.substring(0, 30)}...</p>
                        </div>
                    </div>
                `).join('');
        }

        // Sort
        let sortAsc = true;
        function sortRecipes() {
            recipes.sort((a, b) => sortAsc ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title));
            sortAsc = !sortAsc;
            renderRecipes();
        }

        // Notification
        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'fixed bottom-4 right-4 left-4 sm:left-auto sm:right-4 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-xl z-50 animate-slide-up flex items-center justify-center gap-2 text-sm';
            notif.innerHTML = message;
            document.body.appendChild(notif);
            setTimeout(() => { notif.style.opacity = '0'; setTimeout(() => notif.remove(), 300); }, 2500);
        }

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAddModal(); closeSearchModal(); closeDetailModal(); closeDeleteModal(); closeConfigModal();
            }
        });
    </script>

</body>
</html>
